amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.10
    alpha2: 0.10
    alpha3: 0.15
    alpha4: 0.15
    alpha5: 0.10
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "/scan"
    robot_model_type: "nav2_amcl::OmniMotionModel"
    min_particles: 5000
    max_particles: 20000
    kld_err: 0.03
    kld_z: 0.99
    update_min_d: 0.03
    update_min_a: 0.03
    resample_interval: 1
    transform_tolerance: 1.0
    recovery_alpha_slow: 0.0005
    recovery_alpha_fast: 0.05
    laser_model_type: "likelihood_field_prob"
    laser_likelihood_max_dist: 0.8
    laser_max_range: 25.0
    laser_min_range: 0.8
    max_beams: 240
    z_hit: 0.90
    z_short: 0.03
    z_max: 0.05
    z_rand: 0.05
    sigma_hit: 0.22
    lambda_short: 0.1
    do_beamskip: true
    beam_skip_distance: 0.7
    beam_skip_threshold: 0.4
    beam_skip_error_threshold: 0.8
